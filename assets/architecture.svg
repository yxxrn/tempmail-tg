<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="tempmail-tg architecture">
  <defs>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="360" rx="16" fill="#0b1220"/>
  <text x="32" y="40" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Architecture</text>

  <!-- boxes -->
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <rect x="40" y="80" width="160" height="70" rx="12" fill="url(#box)" stroke="#38bdf8" stroke-width="2"/>
    <text x="120" y="110" text-anchor="middle" font-size="14" fill="#94a3b8">Site / OTP</text>
    <text x="120" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Sender</text>

    <rect x="280" y="80" width="200" height="70" rx="12" fill="url(#box)" stroke="#818cf8" stroke-width="2"/>
    <text x="380" y="110" text-anchor="middle" font-size="14" fill="#94a3b8">Cloudflare</text>
    <text x="380" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#f8fafc">Email Routing</text>

    <rect x="560" y="80" width="200" height="70" rx="12" fill="url(#box)" stroke="#22d3ee" stroke-width="2"/>
    <text x="660" y="110" text-anchor="middle" font-size="14" fill="#94a3b8">Worker</text>
    <text x="660" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">tempmail-tg</text>

    <rect x="560" y="220" width="200" height="70" rx="12" fill="url(#box)" stroke="#a78bfa" stroke-width="2"/>
    <text x="660" y="250" text-anchor="middle" font-size="14" fill="#94a3b8">Storage</text>
    <text x="660" y="272" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">D1 database</text>

    <rect x="280" y="220" width="200" height="70" rx="12" fill="url(#box)" stroke="#229ED9" stroke-width="2"/>
    <text x="380" y="250" text-anchor="middle" font-size="14" fill="#94a3b8">Chat</text>
    <text x="380" y="272" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Telegram bot</text>

    <rect x="40" y="220" width="160" height="70" rx="12" fill="url(#box)" stroke="#34d399" stroke-width="2"/>
    <text x="120" y="250" text-anchor="middle" font-size="14" fill="#94a3b8">You</text>
    <text x="120" y="272" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">/new · /inbox</text>
  </g>

  <!-- arrows -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M200 115 H280"/>
    <path d="M480 115 H560"/>
    <path d="M660 150 V220"/>
    <path d="M560 255 H480"/>
    <path d="M280 255 H200"/>
    <path d="M380 220 V150"/>
  </g>
  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#64748b">
    <text x="220" y="105">MX</text>
    <text x="500" y="105">email event</text>
    <text x="670" y="190">store</text>
    <text x="500" y="245">push</text>
    <text x="220" y="245">commands</text>
    <text x="390" y="190">webhook</text>
  </g>
</svg>
