<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="tempmail-tg banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="980" cy="60" r="120" fill="#38bdf8" opacity="0.08"/>
  <circle cx="180" cy="280" r="140" fill="#818cf8" opacity="0.08"/>

  <!-- envelope -->
  <g transform="translate(90 88)" filter="url(#soft)">
    <rect x="0" y="20" width="160" height="110" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <path d="M8 28 L80 88 L152 28" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="130" cy="100" r="22" fill="#0ea5e9"/>
    <text x="130" y="107" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="700" fill="#0b1220">@</text>
  </g>

  <!-- telegram bubble -->
  <g transform="translate(300 118)">
    <path d="M20 10 h110 a20 20 0 0 1 20 20 v50 a20 20 0 0 1 -20 20 h-70 l-24 22 v-22 h-16 a20 20 0 0 1 -20 -20 v-50 a20 20 0 0 1 20 -20 z" fill="#229ED9"/>
    <path d="M48 55 l55 -22 -68 38 18 8 8 20 12 -18 28 14 z" fill="#fff" opacity="0.95"/>
  </g>

  <text x="520" y="140" font-family="ui-sans-serif,system-ui,sans-serif" font-size="56" font-weight="800" fill="#f8fafc">tempmail-tg</text>
  <text x="520" y="190" font-family="ui-sans-serif,system-ui,sans-serif" font-size="24" fill="#94a3b8">Self-owned temp mail + Telegram bot</text>
  <text x="520" y="230" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" fill="#64748b">Cloudflare Workers · Email Routing · D1</text>
</svg>
